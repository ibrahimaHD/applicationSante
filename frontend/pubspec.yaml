name: health_app
description: Application de santé - HealthCare
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0

  # Stockage local (token, session)
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.0.0

  # UI & icônes
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Utilitaires
  intl: ^0.19.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # PDF - Génération et impression/partage
  pdf: ^3.10.8
  http_parser: ^4.0.2



  # QR code 
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0
# geolocalisation 
  geolocator: ^12.0.0
#Partage de fichiers (PDF → Télécharger / Imprimer / Envoyer)
  share_plus: ^12.0.0
 
  # Accès au système de fichiers
  path_provider: ^2.1.2
 
  url_launcher: ^6.3.0  
  # À AJOUTER pour Module 3
  image_picker: ^1.0.4        # Upload ordonnance (photo/galerie)
  file_picker: ^8.1.6         # Documents PDF/images inscription professionnels
  permission_handler: ^11.0.1  # Permissions caméra/galerie

#actualisation 
  web_socket_channel: ^2.4.0
  socket_io_client: ^2.0.3+1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter:
  uses-material-design: true


name: health_app
description: Application de santé - HealthCare
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0

  # Stockage local (token, session)
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.0.0

  # UI & icônes
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Utilitaires
  intl: ^0.19.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # PDF - Génération et impression/partage
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# QR code 
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0
# geolocalisation 
  geolocator: ^12.0.0
# images
  image_picker: ^1.1.2

flutter:
  uses-material-design: true

  # Police Poppins (à ajouter dans assets/fonts/)
